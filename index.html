<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DaLi STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Playfair+Display:ital,wght@0,800;1,800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            background-color: #000; /* Глубокий черный база */
            overflow: hidden; 
            position: relative;
        }

        /* ХОЛСТ ДЛЯ ДЫШАЩЕГО ТЕМНОГО ФОНА */
        #breathe-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Самый нижний слой */
            filter: blur(15px); /* Сильное размытие для мягкости дыхания */
        }

        /* КОНТЕЙНЕР (ОТДАЛЕННЫЙ) */
        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
            z-index: 10; /* Поверх волн */
            transform: scale(0.9); /* Отдаление контента */
        }

        /* АВАТАРКА */
        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px solid #d4af37;
            margin: 0 auto 25px;
            background-image: url('https://i.ibb.co/fdTY6TFb/copy-6-DE92-EDF-28-FF-49-A9-9225-923-B8-A7-B1-BC6.jpg'); 
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 45px rgba(212, 175, 55, 0.4);
        }

        /* ЗОЛОТИСТЫЙ ЗАГОЛОВОК */
        h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 38px; 
            margin: 10px 0; 
            font-weight: 800; 
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, #d4af37 0%, #ffdf85 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        .description { 
            font-size: 14px; 
            font-weight: 300;
            color: #ccc; 
            margin-bottom: 45px; 
            line-height: 1.6;
            padding: 0 15px;
            opacity: 0.8;
        }

        .label { 
            font-size: 11px; 
            color: #ffdf85; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin-bottom: 25px; 
            font-weight: 600;
        }

        /* КОНТЕЙНЕР КНОПКИ ДЛЯ ИСКОРКИ */
        .button-wrapper {
            position: relative;
            margin-bottom: 25px;
            width: 100%;
        }

        /* КНОПКА: ЧИСТАЯ ПРОЗРАЧНАЯ ЛИНЗА */
        .lens-button {
            display: block;
            width: 100%;
            padding: 24px 20px;
            text-decoration: none;
            color: #fff; 
            font-weight: 600;
            font-size: 17px;
            border-radius: 50px; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            
            /* Стеклянная база */
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); /* Тончайшая обводка */

            box-shadow: 
                0 15px 30px rgba(0, 0, 0, 0.6), 
                0 0 15px rgba(255, 255, 255, 0.1), 
                inset 0 12px 18px rgba(255, 255, 255, 0.15), 
                inset 0 -6px 15px rgba(255, 255, 255, 0.05); 
            
            overflow: hidden;
            z-index: 2; /* Поверх SVG-обводки */
            position: relative;
        }

        /* SVG-ОБВОДКА ДЛЯ ИСКОРКИ */
        .sparkle-path {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Под кнопкой */
            pointer-events: none; /* Не мешать нажатию */
            opacity: 0; /* Невидимый путь */
        }

        /* ИСКОРКА (БЕГАЮЩИЙ БЛИК) */
        .sparkle-dot {
            fill: #fff;
            /* Мягкое белое свечение и след */
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 1)) 
                    drop-shadow(0 0 10px rgba(255, 255, 255, 0.6));
            visibility: hidden; /* Изначально скрыта */
        }

        /* Эффекты при взаимодействии */
        .lens-button:hover {
            transform: translateY(-3px); 
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
        }

        .lens-button:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.12);
        }

    </style>
</head>
<body>

    <canvas id="breathe-canvas"></canvas>

    <div class="container">
        <div class="avatar"></div>

        <h1>DaLi STORE 🛍️</h1>
        
        <p class="description">
            Эстетика, формирующая характер. Твой стиль — твоя власть. <br> Начни восхождение к вершине 🕊️
        </p>

        <div class="label">Присоединяйся</div>

        <div class="button-wrapper">
            <a href="https://t.me/DaLi_STORE_TG" class="lens-button">Вступить в комьюнити</a>
            <svg class="sparkle-path" viewBox="0 0 100 100" preserveAspectRatio="none">
                <rect rx="50" ry="50" x="0" y="0" width="100" height="100" />
            </svg>
            <svg style="position: absolute; width: 0; height: 0;">
                <defs>
                    <g id="sparkle">
                        <circle cx="0" cy="0" r="1.5" />
                    </g>
                </defs>
            </svg>
        </div>

        <div class="button-wrapper">
            <a href="https://t.me/SWiWT_Teams" class="lens-button">Связаться / Заказать</a>
            <svg class="sparkle-path" viewBox="0 0 100 100" preserveAspectRatio="none">
                <rect rx="50" ry="50" x="0" y="0" width="100" height="100" />
            </svg>
        </div>
    </div>

    <script>
        // 1. АНИМАЦИЯ ДЫШАЩЕГО ТЕМНОГО ФОНА (CANVAS)
        const canvas = document.getElementById('breathe-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let time = 0;
        const breathingPoints = [
            { xBase: 0.3, yBase: 0.4, color: 'rgba(26, 26, 26, 0.7)' }, // Темно-серый
            { xBase: 0.7, yBase: 0.6, color: 'rgba(15, 15, 15, 1)' }, // Почти черный
            { xBase: 0.5, yBase: 0.8, color: 'rgba(34, 34, 34, 0.5)' }  // Чуть светлее
        ];

        function drawBreathing() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Заливка базового черного фона
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            time += 0.005; // Скорость дыхания

            breathingPoints.forEach(point => {
                // Колыхание точек дыхания
                const x = point.xBase * canvas.width + Math.sin(time + breathingPoints.indexOf(point)) * (canvas.width * 0.1);
                const y = point.yBase * canvas.height + Math.cos(time + breathingPoints.indexOf(point)) * (canvas.height * 0.1);
                
                // Рисуем мягкое темное пятно
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, canvas.width * 0.5);
                gradient.addColorStop(0, point.color);
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            });

            requestAnimationFrame(drawBreathing);
        }

        drawBreathing();


        // 2. АНИМАЦИЯ БЕГАЮЩЕЙ ИСКОРКИ ПО ОБВОДКЕ (SVG + JS)
        const buttonsWrappers = document.querySelectorAll('.button-wrapper');
        const sparkles = [];

        // Создаем искорки для каждой кнопки
        buttonsWrappers.forEach(wrapper => {
            const svgSparkle = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svgSparkle.setAttribute('viewBox', '0 0 100 100');
            svgSparkle.setAttribute('preserveAspectRatio', 'none');
            svgSparkle.style.position = 'absolute';
            svgSparkle.style.top = '0';
            svgSparkle.style.left = '0';
            svgSparkle.style.width = '100%';
            svgSparkle.style.height = '100%';
            svgSparkle.style.pointerEvents = 'none';
            svgSparkle.style.zIndex = '3'; // Самый верхний слой обводки

            const sparkleDot = document.createElementNS('http://www.w3.org/2000/svg', 'use');
            sparkleDot.setAttributeNS('http://www.w3.org/1999/xlink', 'href', '#sparkle');
            sparkleDot.classList.add('sparkle-dot');
            
            svgSparkle.appendChild(sparkleDot);
            wrapper.appendChild(svgSparkle);

            const path = wrapper.querySelector('.sparkle-path rect');
            const pathLength = path.getTotalLength();

            sparkles.push({
                dot: sparkleDot,
                path: path,
                length: pathLength,
                progress: 0,
                isActive: false
            });
        });

        const sparkleSpeed = 1.5; // Скорость искорки (сек на оборот)
        let activeSparkleIndex = 0; // Начинаем с первой кнопки

        function updateSparkle() {
            // Прячем искорки
            sparkles.forEach(s => s.dot.style.visibility = 'hidden');

            const current = sparkles[activeSparkleIndex];
            current.dot.style.visibility = 'visible'; // Показываем активную

            // Движение
            current.progress += (1 / 60) / sparkleSpeed; 

            if (current.progress >= 1) {
                // Полный оборот сделан, перепрыгиваем на следующую кнопку
                current.progress = 0;
                activeSparkleIndex = (activeSparkleIndex + 1) % sparkles.length;
            } else {
                // Расчет позиции искорки по пути SVG
                const point = current.path.getPointAtLength(current.progress * current.length);
                current.dot.setAttribute('x', point.x);
                current.dot.setAttribute('y', point.y);
            }

            requestAnimationFrame(updateSparkle);
        }

        // Запускаем через секунду после загрузки, чтобы всё успело прорисоваться
        setTimeout(updateSparkle, 1000);

    </script>
</body>
</html>
