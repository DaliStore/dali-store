<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
    
    <title>DaLi STORE — PREMIUM LOOK</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* Анимация перелива золота */
        @keyframes goldFlow {
            0% { transform: translate(-10%, -10%) rotate(0deg); }
            100% { transform: translate(10%, 10%) rotate(5deg); }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #050505 !important; /* Еще темнее для контраста */
            margin: 0; padding: 20px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; text-align: center;
            overflow: hidden; position: relative;
            color: #ffffff;
        }

        /* ТЕКСТУРА ФОНА (Эффект дорогой бумаги/карбона) */
        body::before {
            content: "";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.15; /* Очень тонко, едва заметно */
            z-index: -1;
            pointer-events: none;
        }

        /* ЖИВЫЕ ЗОЛОТЫЕ БЛИКИ */
        .gold-glow-spot {
            position: absolute; border-radius: 50%;
            filter: blur(100px); -webkit-filter: blur(100px);
            z-index: -2;
            animation: goldFlow 12s infinite alternate ease-in-out;
            pointer-events: none;
        }

        .avatar-box {
            width: 140px; height: 140px; border-radius: 50%;
            margin-bottom: 25px; 
            border: 2px solid #d4af37;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.4);
            overflow: hidden; 
            background: #000;
            position: relative;
            z-index: 1;
        }

        .img-fix { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-size: 32px; font-weight: 900; color: #ffffff; margin-bottom: 10px; letter-spacing: -0.5px; z-index: 1; }
        p { font-size: 15px; color: #a1a1a1; max-width: 300px; margin-bottom: 40px; line-height: 1.5; z-index: 1; }

        .stack { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 16px; z-index: 1; }

        .gold-power-btn {
            display: flex; align-items: center; justify-content: center;
            padding: 20px; border-radius: 20px;
            font-size: 17px; font-weight: 800; text-decoration: none;
            background: linear-gradient(135deg, #d4af37, #b8860b);
            color: #000; border: none;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.5);
            transition: all 0.3s ease;
        }

        .dark-glass-element {
            display: flex; align-items: center; justify-content: center;
            padding: 20px; border-radius: 20px;
            font-size: 17px; font-weight: 700; text-decoration: none;
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(212, 175, 55, 0.25) !important;
            color: #d4af37 !important;
            backdrop-filter: blur(25px) !important;
            -webkit-backdrop-filter: blur(25px) !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
        }

        .gold-power-btn:active, .dark-glass-element:active { transform: scale(0.96); }

        .links-title {
            font-size: 11px; text-transform: uppercase; letter-spacing: 3px;
            color: #d4af37; margin-bottom: 15px; opacity: 0.7; font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="gold-glow-spot" style="width:400px; height:400px; background:rgba(212, 175, 55, 0.12); top:-10%; left:-10%;"></div>
    <div class="gold-glow-spot" style="width:350px; height:350px; background:rgba(184, 134, 11, 0.1); bottom:-5%; right:-5%; animation-delay:-6s;"></div>

    <div class="avatar-box">
        <img src="https://i.ibb.co/3ykG6vXj/image.png" class="img-fix">
    </div>

    <h1>DaLi STORE 📀</h1>
    <p>Вещи, которые создают твой вайб. Твой стиль — твои правила. Восхождение к вершине начинается здесь 🕊️</p>

    <div class="links-title">NAVIGATE YOUR STYLE</div>
    <div class="stack">
        <a href="https://t.me/DaLi_STORE_TG" class="gold-power-btn">Вступить в комьюнити</a>
        <a href="https://t.me/SWiWT_Teams" class="dark-glass-element">Связаться / Заказать</a>
        <a href="https://t.me/danreads1" class="dark-glass-element">Дневник дисциплины</a>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.backgroundColor = '#050505';
        tg.headerColor = '#050505';
    </script>
</body>
</html>
