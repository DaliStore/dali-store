<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DaLi STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Playfair+Display:ital,wght@0,800;1,800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            
            /* ЖИВОЙ ПЕРЕЛИВАЮЩИЙСЯ ФОН (Эффект флага/волн) */
            background: linear-gradient(270deg, #0a0a0a, #1a1a1a, #0d0d0d, #222, #0d0d0d, #1a1a1a);
            background-size: 800% 800%; /* Увеличил размер для плавности волн */
            animation: gradient-waves 20s ease-in-out infinite; /* Ускорил анимацию */
            overflow-x: hidden;
        }

        /* Анимация волн */
        @keyframes gradient-waves {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 380px;
            padding: 20px;
            text-align: center;
            z-index: 10;
        }

        /* АВАТАРКА: Исправлена, не черная */
        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px solid #d4af37;
            margin: 0 auto 25px;
            /* ПРЯМАЯ ССЫЛКА НА ЛОГО */
            background-image: url('https://i.ibb.co/hJxLbZW8/copy-6-DB5-C6-B6-62-D0-45-BF-9991-97-A7-E0-ECC99-B.jpg'); 
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 45px rgba(212, 175, 55, 0.4); /* Золотое свечение */
        }

        h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 36px; 
            margin: 10px 0; 
            font-weight: 800; 
            letter-spacing: 1.5px;
            color: #fff;
        }

        .description { 
            font-size: 14px; 
            font-weight: 300;
            color: #ccc; 
            margin-bottom: 45px; 
            line-height: 1.6;
            padding: 0 15px;
            opacity: 0.8;
        }

        .label { 
            font-size: 11px; 
            color: #d4af37; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin-bottom: 25px; 
            font-weight: 600;
        }

        /* КНОПКА: БЕЛАЯ КАПЛЯ / ЛИНЗА */
        .lens-button {
            display: block;
            width: 100%;
            margin-bottom: 25px; /* Разделил их */
            padding: 24px 20px;
            text-decoration: none;
            color: #111; /* Темный текст для контраста */
            font-weight: 600;
            font-size: 17px;
            border-radius: 50px; /* Скругленные, как капля */
            position: relative;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            
            /* Стеклянная база (белая) */
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0.7) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);

            /* ЭФФЕКТ ОБЪЕМНОЙ БЕЛОЙ КАПЛИ */
            box-shadow: 
                0 15px 30px rgba(0, 0, 0, 0.6), /* Тень снизу */
                0 0 25px rgba(255, 255, 255, 0.4), /* Внешнее белое сияние */
                inset 0 12px 18px rgba(255, 255, 255, 0.5), /* Жесткий блик сверху для объема */
                inset 0 -6px 15px rgba(255, 255, 255, 0.2); /* Мягкий отсвет снизу внутри */
            
            overflow: hidden;
        }

        /* Дополнительный верхний глянцевый блик */
        .lens-button::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 15%;
            right: 15%;
            height: 30%;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0) 100%);
            border-radius: 40px;
            pointer-events: none;
        }

        /* Эффект при наведении/нажатии */
        .lens-button:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.7);
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="avatar"></div>

        <h1>DaLi STORE 🛍️</h1>
        
        <p class="description">
            Эстетика, формирующая характер. Твой стиль — твоя власть. <br> Начни восхождение к вершине 🕊️
        </p>

        <div class="label">Присоединяйся</div>

        <a href="https://t.me/DaLi_STORE_TG" class="lens-button">Вступить в комьюнити</a>
        
        <a href="https://t.me/SWiWT_Teams" class="lens-button">Связаться / Заказать</a>
    </div>

</body>
</html>
