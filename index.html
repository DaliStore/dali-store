<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DaLi STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Playfair+Display:ital,wght@0,800;1,800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            /* Убрали старый CSS-градиент, теперь фон через Canvas */
            overflow: hidden; 
            position: relative;
        }

        /* ЭТОТ БЛОК ОТВЕЧАЕТ ЗА ФОН */
        #waves-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Самый нижний слой */
            filter: blur(5px); /* Легкое размытие для мягкости */
        }

        /* КОНТЕЙНЕР (ОТДАЛЕННЫЙ, КАК НА РЕФЕРЕНСЕ) */
        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
            z-index: 10; /* Поверх волн */
            transform: scale(0.9); /* Отдаление контента */
        }

        /* АВАТАРКА */
        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px solid #d4af37;
            margin: 0 auto 25px;
            background-image: url('https://i.ibb.co/fdTY6TFb/copy-6-DE92-EDF-28-FF-49-A9-9225-923-B8-A7-B1-BC6.jpg'); 
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 45px rgba(212, 175, 55, 0.4);
        }

        /* ЗОЛОТИСТЫЙ ЗАГОЛОВОК */
        h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 38px; 
            margin: 10px 0; 
            font-weight: 800; 
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, #d4af37 0%, #ffdf85 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        .description { 
            font-size: 14px; 
            font-weight: 300;
            color: #ccc; 
            margin-bottom: 45px; 
            line-height: 1.6;
            padding: 0 15px;
            opacity: 0.8;
        }

        .label { 
            font-size: 11px; 
            color: #ffdf85; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin-bottom: 25px; 
            font-weight: 600;
        }

        /* КНОПКА: ЧИСТАЯ ПРОЗРАЧНАЯ ЛИНЗА */
        .lens-button {
            display: block;
            width: 100%;
            margin-bottom: 25px; 
            padding: 24px 20px;
            text-decoration: none;
            color: #fff; 
            font-weight: 600;
            font-size: 17px;
            border-radius: 50px; 
            position: relative;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            
            background: rgba(255, 255, 255, 0.1); 
            
            /* ЭФФЕКТ СТЕКЛА ДЛЯ ПРЕЛОМЛЕНИЯ ВОЛН */
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);

            box-shadow: 
                0 15px 30px rgba(0, 0, 0, 0.6), 
                0 0 15px rgba(255, 255, 255, 0.1), 
                inset 0 12px 18px rgba(255, 255, 255, 0.15), 
                inset 0 -6px 15px rgba(255, 255, 255, 0.05); 
            
            overflow: hidden;
        }

        /* Эффекты при взаимодействии */
        .lens-button:hover {
            transform: translateY(-3px); 
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
        }

        .lens-button:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.12);
        }

    </style>
</head>
<body>

    <canvas id="waves-canvas"></canvas>

    <div class="container">
        <div class="avatar"></div>

        <h1>DaLi STORE 🛍️</h1>
        
        <p class="description">
            Эстетика, формирующая характер. Твой стиль — твоя власть. <br> Начни восхождение к вершине 🕊️
        </p>

        <div class="label">Присоединяйся</div>

        <a href="https://t.me/DaLi_STORE_TG" class="lens-button">Вступить в комьюнити</a>
        <a href="https://t.me/SWiWT_Teams" class="lens-button">Связаться / Заказать</a>
    </div>

    <script>
        const canvas = document.getElementById('waves-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let offset = 0;
        const waves = [
            { amplitude: 15, frequency: 0.02, speed: 0.03, color: 'rgba(26, 26, 26, 0.8)' }, // Темно-серый
            { amplitude: 20, frequency: 0.01, speed: 0.02, color: 'rgba(10, 10, 10, 1)' }, // Глубокий черный
            { amplitude: 10, frequency: 0.03, speed: 0.04, color: 'rgba(34, 34, 34, 0.6)' }  // Чуть светлее
        ];

        function drawWaves() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Заливка базового черного фона
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            offset += 0.01;

            waves.forEach(wave => {
                ctx.beginPath();
                ctx.moveTo(0, canvas.height);

                for (let x = 0; x < canvas.width; x++) {
                    const angle = x * wave.frequency + offset * wave.speed;
                    // Рисуем волну, смещенную вертикально
                    const y = canvas.height * 0.5 + Math.sin(angle) * wave.amplitude + (waves.indexOf(wave) * 20); 
                    ctx.lineTo(x, y);
                }

                ctx.lineTo(canvas.width, canvas.height);
                ctx.fillStyle = wave.color;
                ctx.fill();
            });

            requestAnimationFrame(drawWaves);
        }

        drawWaves();
    </script>
</body>
</html>
