<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>DaLi STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Playfair+Display:ital,wght@0,800;1,800&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* ЭКСТРЕМАЛЬНО ПЛАВНАЯ АНИМАЦИЯ */
        @keyframes ultraSmooth {
            0% { 
                opacity: 0; 
                transform: translateY(10px); 
            }
            100% { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        .reveal {
            opacity: 0;
            /* Используем hardware acceleration */
            will-change: transform, opacity;
            animation: ultraSmooth 1.4s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(212, 175, 55, 0.12), transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(212, 175, 55, 0.08), transparent 50%),
                url('https://www.transparenttextures.com/patterns/stardust.png');
            background-attachment: fixed;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 380px;
            padding: 40px 25px; 
            text-align: center;
            z-index: 10;
        }

        .avatar {
            width: 130px; 
            height: 130px;
            border-radius: 50%;
            border: 2px solid #d4af37;
            margin: 0 auto 40px; /* Еще чуть больше воздуха */
            background-image: url('https://i.ibb.co/fdTY6TFb/copy-6-DE92-EDF-28-FF-49-A9-9225-923-B8-A7-B1-BC6.jpg'); 
            background-size: cover;
            background-position: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation-delay: 0.2s;
        }

        h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 34px; 
            margin: 0 0 25px 0; 
            font-weight: 800; 
            background: linear-gradient(135deg, #d4af37 0%, #ffdf85 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation-delay: 0.4s;
        }

        .description { 
            font-size: 14px; 
            color: #ccc; 
            margin-bottom: 55px; /* Максимальный воздух */
            line-height: 1.8;
            opacity: 0.8;
            animation-delay: 0.6s;
        }

        .label { 
            font-size: 10px; 
            color: #ffdf85; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            margin-bottom: 30px; 
            animation-delay: 0.8s;
        }

        .lens-button {
            display: block;
            width: 100%;
            margin-bottom: 20px; 
            padding: 22px;
            text-decoration: none;
            color: #fff; 
            font-weight: 600;
            border-radius: 50px; 
            background: rgba(255, 255, 255, 0.07); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .btn-1 { animation-delay: 1s; }
        .btn-2 { animation-delay: 1.2s; }

        .lens-button:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar reveal"></div>
        
        <h1 class="reveal">DaLi STORE 🛍️</h1>
        
        <p class="description reveal">
            Эстетика, формирующая характер.<br>Твой стиль — твоя власть.<br>Начни восхождение к вершине 🕊️
        </p>
        
        <div class="label reveal">Присоединяйся</div>
        <a href="https://t.me/DaLi_STORE_TG" class="lens-button reveal btn-1">Вступить в комьюнити</a>
        <a href="https://t.me/SWiWT_Teams" class="lens-button reveal btn-2">Связаться / Заказать</a>
    </div>

</body>
</html>
