<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DaLi STORE</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 360px;
            padding: 20px;
            text-align: center;
        }

        /* АВАТАРКА С ПРЯМОЙ ССЫЛКОЙ */
        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 2px solid #d4af37;
            margin: 0 auto 25px;
            /* Вот эта ссылка прямая, она будет работать: */
            background-image: url('https://i.ibb.co/xSHNsYfS/image.png'); 
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
        }

        h1 { font-size: 28px; margin: 10px 0; font-weight: bold; }

        .description {
            font-size: 15px;
            color: #ccc;
            line-height: 1.5;
            margin-bottom: 35px;
            padding: 0 10px;
        }

        .join-label {
            font-size: 11px;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* ЕДИНЫЙ СТЕКЛЯННЫЙ БЛОК */
        .glass-menu {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        /* КНОПКИ */
        .btn {
            padding: 22px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 17px;
            transition: background 0.3s, transform 0.1s;
            border: none;
            background: transparent;
            cursor: pointer;
            display: block;
        }

        /* Разделительная линия между кнопками */
        .btn-top {
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            color: #d4af37; /* Золотой акцент на первую кнопку */
        }

        .btn:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.98);
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="avatar"></div>

        <h1>DaLi STORE 🛍️</h1>
        
        <p class="description">
            Эстетика, формирующая характер. Твой стиль — твоя власть. Начни восхождение к вершине 🕊️
        </p>

        <div class="join-label">Присоединяйся</div>

        <div class="glass-menu">
            <a href="https://t.me/твой_канал" class="btn btn-top">Вступить в комьюнити</a>
            <a href="https://t.me/твой_логин" class="btn">Связаться / Заказать</a>
        </div>
    </div>

</body>
</html>
