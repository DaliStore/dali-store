<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>DaLi STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Playfair+Display:ital,wght@0,800;1,800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            
            /* Исправленный фон для максимальной совместимости */
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(212, 175, 55, 0.1), transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(212, 175, 55, 0.08), transparent 50%),
                url('https://www.transparenttextures.com/patterns/stardust.png');
            background-attachment: fixed;
            position: relative;
            overflow: hidden;
        }

        /* Добавляем живое свечение (с префиксами для Android) */
        body::before {
            content: "";
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.04) 0%, transparent 70%);
            top: -25%;
            left: -25%;
            -webkit-animation: move-glow 15s infinite alternate ease-in-out;
            animation: move-glow 15s infinite alternate ease-in-out;
            z-index: 0;
            pointer-events: none;
        }

        @-webkit-keyframes move-glow {
            0% { -webkit-transform: translate(0, 0); transform: translate(0, 0); }
            100% { -webkit-transform: translate(8%, 8%); transform: translate(8%, 8%); }
        }

        @keyframes move-glow {
            0% { transform: translate(0, 0); }
            100% { transform: translate(8%, 8%); }
        }
