<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DaLi STORE</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* АВАТАРКА: Исправил отображение */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid #d4af37;
            margin-bottom: 20px;
            background-image: url('https://i.postimg.cc/mD83W0Br/dali.jpg'); /* ПРЯМАЯ ССЫЛКА */
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        h1 { font-size: 26px; margin: 0; font-weight: bold; }
        
        .desc {
            font-size: 14px;
            color: #ccc;
            text-align: center;
            max-width: 300px;
            margin: 15px 0 30px;
        }

        .label {
            font-size: 11px;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        /* ЕДИНЫЙ СТЕКЛЯННЫЙ БЛОК: Слитные кнопки */
        .glass-box {
            width: 100%;
            max-width: 350px;
            background: rgba(255, 255, 255, 0.08); /* Эффект стекла */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden; /* Чтобы края кнопок не вылезали за радиус */
        }

        .item {
            display: block;
            width: 100%;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            transition: 0.2s;
            border: none;
            background: transparent;
            cursor: pointer;
        }

        /* Разделитель между кнопками */
        .border-bottom {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Золотой текст для первой кнопки */
        .gold-text { color: #d4af37; }

        .item:active {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div class="avatar"></div>

    <h1>DaLi STORE 💿</h1>
    
    <div class="desc">
        Вещи, которые создают твой вайб. Твой стиль — твои правила. Начни путь к статусу 🕊️
    </div>

    <div class="label">Присоединяйся</div>

    <div class="glass-box">
        <a href="ТВОЯ_ССЫЛКА_1" class="item border-bottom gold-text">Вступить в комьюнити</a>
        <a href="ТВОЯ_ССЫЛКА_2" class="item">Связаться / Заказать</a>
    </div>

</body>
</html>
