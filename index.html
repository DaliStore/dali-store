<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DaLi STORE</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            /* Живой темный фон */
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a, #0d0d0d);
            background-size: 400% 400%;
            animation: gradient-bg 15s ease infinite;
        }

        @keyframes gradient-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 360px;
            padding: 20px;
            text-align: center;
        }

        /* АВАТАРКА */
        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 2px solid #d4af37;
            margin: 0 auto 25px;
            background-image: url('https://i.ibb.co/xSHNsYfS/image.png'); 
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        h1 { font-size: 28px; margin: 10px 0; font-weight: 800; }
        .description { font-size: 15px; color: #ccc; margin-bottom: 30px; line-height: 1.4; }
        .label { font-size: 11px; color: #d4af37; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }

        /* СТИЛЬ КНОПКИ-ЛИНЗЫ */
        .lens-button {
            display: block;
            width: 100%;
            margin-bottom: 20px; /* Разделил их */
            padding: 22px;
            text-decoration: none;
            color: #fff;
            font-weight: 600;
            font-size: 17px;
            border-radius: 20px;
            position: relative;
            transition: all 0.3s ease;
            
            /* Стеклянный эффект */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);

            /* ЭФФЕКТ ОБЪЕМНОЙ ЛИНЗЫ И СИНЕГО СВЕЧЕНИЯ */
            box-shadow: 
                0 10px 20px rgba(0, 0, 0, 0.5), /* Тень снизу */
                0 0 15px rgba(0, 102, 255, 0.2), /* Мягкое синее свечение */
                inset 0 8px 12px rgba(255, 255, 255, 0.15), /* Блик сверху для объема */
                inset 0 -4px 10px rgba(0, 102, 255, 0.2); /* Синий отблеск снизу внутри */
        }

        /* Золотой текст для первой кнопки */
        .gold-glow { color: #d4af37; }

        /* Эффект при наведении/нажатии */
        .lens-button:active {
            transform: scale(0.96);
            box-shadow: 
                0 5px 10px rgba(0, 0, 0, 0.5),
                0 0 25px rgba(0, 102, 255, 0.5), /* Усиление синего при клике */
                inset 0 4px 8px rgba(255, 255, 255, 0.1);
            background: rgba(0, 102, 255, 0.1);
        }

        /* Дополнительный верхний блик (линза) */
        .lens-button::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 10%;
            right: 10%;
            height: 30%;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.15), transparent);
            border-radius: 10px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar"></div>

        <h1>DaLi STORE 🛍️</h1>
        
        <p class="description">
            Эстетика, формирующая характер. Твой стиль — твоя власть. Начни восхождение к вершине 🕊️
        </p>

        <div class="label">Присоединяйся</div>

        <a href="https://t.me/DaLi_STORE_TG" class="lens-button gold-glow">Вступить в комьюнити</a>
        
        <a href="https://t.me/SWiWT_Teams" class="lens-button">Связаться / Заказать</a>
    </div>

</body>
</html>
