<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DaLi STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Playfair+Display:ital,wght@0,800;1,800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            /* Дышащий темный фон */
            background: linear-gradient(135deg, #050505, #111, #0a0a0a);
            background-size: 400% 400%;
            animation: gradient-bg 20s ease infinite;
            overflow-x: hidden;
        }

        @keyframes gradient-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 380px;
            padding: 20px;
            text-align: center;
        }

        /* АВАТАРКА */
        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px solid #d4af37;
            margin: 0 auto 25px;
            background-image: url('https://i.ibb.co/xSHNsYfS/image.png'); 
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.3);
        }

        h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 34px; 
            margin: 10px 0; 
            font-weight: 800; 
            letter-spacing: 1px;
            color: #fff;
        }

        .description { 
            font-size: 14px; 
            font-weight: 300;
            color: #aaa; 
            margin-bottom: 40px; 
            line-height: 1.6;
            padding: 0 15px;
        }

        .label { 
            font-size: 11px; 
            color: #d4af37; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin-bottom: 25px; 
            font-weight: 600;
        }

        /* КНОПКА: ФУТУРИСТИЧНАЯ ГЛЯНЦЕВАЯ ЛИНЗА */
        .lens-button {
            display: block;
            width: 100%;
            margin-bottom: 25px; /* Разделил их */
            padding: 26px 20px;
            text-decoration: none;
            color: #fff; /* Серебряный/белый текст */
            font-weight: 600;
            font-size: 17px;
            border-radius: 20px; /* Углы острее, как на референсе */
            position: relative;
            transition: all 0.3s ease-out;
            
            /* Стеклянная база */
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);

            /* ЭФФЕКТ ГЛУБОКОГО СТЕКЛА И НЕОНА */
            box-shadow: 
                0 15px 35px rgba(0, 0, 0, 0.7), /* Тень снизу */
                0 0 25px rgba(0, 102, 255, 0.3), /* Внешний синий нимб */
                inset 0 8px 15px rgba(255, 255, 255, 0.15), /* Мягкий блик внутри сверху */
                inset 0 -5px 15px rgba(0, 102, 255, 0.2); /* Синий отсвет внутри снизу */
            
            overflow: hidden; /* Чтобы блик не вылезал */
        }

        /* Жесткий глянцевый блик линзы */
        .lens-button::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 5px;
            right: 5px;
            height: 45%;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0) 100%);
            border-radius: 16px 16px 10px 10px;
            pointer-events: none;
        }

        /* Эффект при наведении */
        .lens-button:hover {
            transform: scale(1.02);
            box-shadow: 
                0 18px 45px rgba(0, 0, 0, 0.8),
                0 0 35px rgba(0, 102, 255, 0.5), /* Усиление синего */
                inset 0 10px 20px rgba(255, 255, 255, 0.2),
                inset 0 -7px 18px rgba(0, 102, 255, 0.3);
            background: rgba(255, 255, 255, 0.06);
        }

        /* Эффект при клике */
        .lens-button:active {
            transform: scale(0.97);
            background: rgba(0, 102, 255, 0.15);
            box-shadow: 0 0 50px rgba(0, 102, 255, 0.8);
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="avatar"></div>

        <h1>DaLi STORE 🛍️</h1>
        
        <p class="description">
            Эстетика, формирующая характер. Твой стиль — твоя власть. <br> Начни восхождение к вершине 🕊️
        </p>

        <div class="label">Присоединяйся</div>

        <a href="https://t.me/DaLi_STORE_TG" class="lens-button">Вступить в комьюнити</a>
        
        <a href="https://t.me/SWiWT_Teams" class="lens-button">Связаться / Заказать</a>
    </div>

</body>
</html>
