<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DaLi STORE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            /* Анимированный фон: теперь ты точно заметишь разницу */
            background: linear-gradient(-45deg, #ffffff, #f1f5f9, #e2e8f0, #ffffff);
            background-size: 400% 400%;
            animation: gradientBg 15s ease infinite;
            color: #1e293b;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; text-align: center;
        }

        .avatar-container {
            width: 145px; height: 145px;
            border-radius: 50%;
            margin-bottom: 25px;
            border: 3px solid #2481cc;
            box-shadow: 0 12px 30px rgba(36, 129, 204, 0.25);
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            background-color: #000;
            position: relative;
        }

        .profile-pic {
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scale(1.7);
            image-rendering: -webkit-optimize-contrast;
        }

        h1 { font-size: 30px; margin: 0 0 10px 0; font-weight: 900; color: #0f172a; }
        p { font-size: 16px; margin: 0 auto 40px auto; max-width: 310px; line-height: 1.6; color: #475569; }
        
        .btn-container {
            width: 100%; max-width: 340px;
            display: flex; flex-direction: column; gap: 18px;
        }
        
        .btn {
            display: flex; align-items: center; justify-content: center;
            width: 100%; box-sizing: border-box;
            padding: 20px; border-radius: 22px;
            font-size: 18px; font-weight: 800; text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-main {
            background: linear-gradient(135deg, #2481cc 0%, #1d4ed8 100%);
            color: #ffffff;
            box-shadow: 0 10px 25px rgba(36, 129, 204, 0.4);
            border: none;
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.7);
            border: 2px solid #2481cc;
            color: #2481cc;
            backdrop-filter: blur(5px);
        }

        .btn:active {
            transform: scale(0.94);
            filter: brightness(1.1);
        }

        /* Декоративное пятно, чтобы фон «украшал» */
        .blur-spot {
            position: fixed;
            width: 300px; height: 300px;
            background: rgba(36, 129, 204, 0.1);
            filter: blur(100px);
            border-radius: 50%;
            z-index: -1;
            top: 20%; left: -10%;
        }
    </style>
</head>
<body>
    <div class="blur-spot"></div>

    <div class="avatar-container">
        <img src="https://i.ibb.co/XfSSb3YH/IMG-5353.jpg" alt="Logo" class="profile-pic">
    </div>

    <h1>DaLi STORE 👋</h1>
    <p>Вещи, которые создают твой вайб 📦 От эксклюзивного дропа до предметов интерьера. Твой стиль — твои правила 🕊️</p>

    <div class="btn-container">
        <a href="https://t.me/DaLi_STORE_TG" class="btn btn-main">Вступить в комьюнити</a>
        <a href="https://t.me/SWiWT_Teams" class="btn btn-outline">Связаться / Заказать</a>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();
    </script>
</body>
</html>
