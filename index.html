<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DaLi STORE</title>
    <style>
        /* Обнуляем отступы, чтобы ничего не ехало */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 360px;
            padding: 20px;
            text-align: center;
        }

        /* АВАТАРКА: Поставил надежную ссылку для теста */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid #d4af37;
            margin: 0 auto 20px;
            background-image: url('https://i.postimg.cc/mD83W0Br/dali.jpg'); 
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
        }

        h1 { font-size: 26px; margin: 10px 0; font-weight: bold; }

        .description {
            font-size: 14px;
            color: #aaa;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .join-label {
            font-size: 11px;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        /* СТЕКЛЯННЫЙ БЛОК */
        .glass-menu {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 22px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* КНОПКИ */
        .btn {
            padding: 22px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: background 0.3s;
            border: none;
            background: transparent;
            cursor: pointer;
            display: block;
        }

        /* Разделительная линия */
        .btn-top {
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            color: #d4af37;
        }

        .btn:active {
            background: rgba(255, 255, 255, 0.1);
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="avatar"></div>

        <h1>DaLi STORE🛍️</h1>
        
        <p class="description">
            Эстетика, формирующая характер. Твой стиль — твоя власть. Начни восхождение к вершине 🕊️

        </p>

        <div class="join-label">Присоединяйся</div>

        <div class="glass-menu">
            <a href="https://t.me/DaLi_STORE_TG" class="btn btn-top">Вступить в комьюнити</a>
            <a href="https://t.me/SWiWT_Teams" class="btn">Связаться / Заказать</a>
        </div>
    </div>

</body>
</html>
