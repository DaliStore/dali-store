<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DaLi STORE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #ffffff;
            color: #1e293b;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Те самые живые пятна на фоне, которые украшают */
        .bg-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: move 20s infinite alternate;
        }
        .sphere-1 { width: 300px; height: 300px; background: rgba(36, 129, 204, 0.15); top: -100px; right: -50px; }
        .sphere-2 { width: 250px; height: 250px; background: rgba(36, 129, 204, 0.1); bottom: -50px; left: -50px; }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 50px); }
        }

        .avatar-container {
            width: 145px; height: 145px;
            border-radius: 50%;
            margin-bottom: 25px;
            border: 3px solid #2481cc;
            box-shadow: 0 12px 30px rgba(36, 129, 204, 0.2);
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            background-color: #000;
        }

        .profile-pic {
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scale(1.7);
            image-rendering: -webkit-optimize-contrast;
        }

        h1 { font-size: 30px; margin: 0 0 12px 0; font-weight: 900; color: #0f172a; }
        p { font-size: 16px; margin: 0 auto 40px auto; max-width: 300px; line-height: 1.6; color: #475569; }
        
        .btn-container {
            width: 100%; max-width: 340px;
            display: flex; flex-direction: column; gap: 18px;
        }
        
        .btn {
            display: flex; align-items: center; justify-content: center;
            width: 100%; box-sizing: border-box;
            padding: 20px; border-radius: 22px;
            font-size: 18px; font-weight: 800; text-decoration: none;
            transition: all 0.3s ease;
        }

        /* Яркий основной призыв */
        .btn-main {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: #ffffff;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
            border: none;
        }

        /* Тот самый ЭФФЕКТ СТЕКЛА */
        .btn-outline {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(36, 129, 204, 0.3);
            color: #1d4ed8;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="bg-sphere sphere-1"></div>
    <div class="bg-sphere sphere-2"></div>

    <div class="avatar-container">
        <img src="https://i.ibb.co/XfSSb3YH/IMG-5353.jpg" alt="Logo" class="profile-pic">
    </div>

    <h1>DaLi STORE 👋</h1>
    <p>Вещи, которые создают твой вайб 📦 От эксклюзивного дропа до уютных деталей дома. Твой стиль начинается здесь 🕊️</p>

    <div class="btn-container">
        <a href="https://t.me/DaLi_STORE_TG" class="btn btn-main">Вступить в комьюнити</a>
        <a href="https://t.me/SWiWT_Teams" class="btn btn-outline">Связаться / Заказать</a>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();
    </script>
</body>
</html>
