<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DaLi STORE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; text-align: center;
        }
        .profile-pic {
            width: 120px; height: 120px;
            border-radius: 50%; margin-bottom: 20px;
            object-fit: cover; border: 3px solid var(--tg-theme-button-color, #2481cc);
        }
        h1 { font-size: 24px; margin: 0 0 10px 0; }
        p { font-size: 16px; margin: 0 auto 30px auto; max-width: 280px; line-height: 1.4; opacity: 0.9; }
        .btn-container {
            width: 100%; max-width: 320px;
            display: flex; flex-direction: column; gap: 12px;
        }
        .btn {
            display: flex; align-items: center; justify-content: center;
            width: 100%; box-sizing: border-box;
            padding: 16px; border-radius: 14px;
            font-size: 17px; font-weight: 600; text-decoration: none;
        }
        .btn-main {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
        }
        .btn-outline {
            border: 2px solid var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-color, #2481cc);
        }
    </style>
</head>
<body>
    <img src="https://i.ibb.co/XfSSb3YH/IMG-5353.jpg" alt="Logo" class="profile-pic">

    <h1>DaLi STORE 👋</h1>
    <p>Окружите себя вещами, которые имеют значение 📦 От лимитированных коллекций одежды до уютных деталей дома. Ваш стиль начинается здесь 🕊️</p>

    <div class="btn-container">
        <a href="https://t.me/DaLi_STORE_TG" class="btn btn-main">Перейти в канал</a>
        <a href="https://t.me/SWiWT_Teams" class="btn btn-outline">Заказать / Чат</a>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
    </script>
</body>
</html>
