<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DaLi_STORE | Визитка</title>
    <style>
        /* Базовые настройки стиля "Машины" */
        body {
            background-color: #0a0a0a; /* Глубокий черный */
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* Анимация появления */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            opacity: 0; /* Изначально скрыты */
            animation: fadeInUp 0.8s ease-out forwards;
        }

        /* Задержки для поэтапного появления элементов */
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 400px;
            width: 90%;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid #d4af37; /* Золотой кант */
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        h1 {
            font-size: 24px;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        p {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .link-button {
            display: block;
            background: linear-gradient(45deg, #1a1a1a, #2a2a2a);
            color: white;
            text-decoration: none;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid #333;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .link-button:hover {
            transform: scale(1.03);
            border-color: #d4af37; /* Золото при наведении */
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            background: linear-gradient(45deg, #2a2a2a, #3a3a3a);
        }

        /* Тот самый акцент на Telegram */
        .tg-button {
            border: 1px solid #0088cc;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="your-logo.png" alt="DaLi Logo" class="profile-img fade-in delay-1">
        
        <h1 class="fade-in delay-2">DaLi_STORE</h1>
        <p class="fade-in delay-2">Дисциплина. Качество. Стиль.</p>

        <div class="fade-in delay-3">
            <a href="https://t.me/your_bot" class="link-button tg-button">🛒 Магазин (Telegram Bot)</a>
            <a href="https://t.me/danreads1" class="link-button">📚 Канал по Дисциплине</a>
            <a href="https://t.me/DanWay" class="link-button">🚀 Мой Путь</a>
        </div>
    </div>

</body>
</html>
