<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DaLi STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Playfair+Display:ital,wght@0,800;1,800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            
            /* ЖИВОЙ ПЕРЕЛИВАЮЩИЙСЯ ФОН (Эффект флага/волн) */
            background: linear-gradient(270deg, #050505, #111, #0a0a0a, #151515, #0a0a0a, #111);
            background-size: 800% 800%;
            animation: gradient-waves 25s ease-in-out infinite;
            overflow-x: hidden;
        }

        /* Анимация волн */
        @keyframes gradient-waves {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 380px;
            padding: 20px;
            text-align: center;
            z-index: 10;
        }

        /* АВАТАРКА С НОВЫМ ЛОГО */
        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px solid #d4af37;
            margin: 0 auto 25px;
            /* ПРЯМАЯ ССЫЛКА НА НОВОЕ ЛОГО */
            background-image: url('https://i.ibb.co/fdTY6TFb/copy-6-DE92-EDF-28-FF-49-A9-9225-923-B8-A7-B1-BC6.jpg'); 
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 45px rgba(212, 175, 55, 0.4); /* Золотое свечение */
        }

        /* ЗОЛОТИСТЫЙ ЗАГОЛОВОК */
        h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 38px; 
            margin: 10px 0; 
            font-weight: 800; 
            letter-spacing: 1.5px;
            
            /* Градиент для золота */
            background: linear-gradient(135deg, #d4af37 0%, #ffdf85 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        .description { 
            font-size: 14px; 
            font-weight: 300;
            color: #ccc; 
            margin-bottom: 45px; 
            line-height: 1.6;
            padding: 0 15px;
            opacity: 0.8;
        }

        .label { 
            font-size: 11px; 
            color: #ffdf85; /* Более светлое золото */
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin-bottom: 25px; 
            font-weight: 600;
        }

        /* КНОПКА: ПРОЗРАЧНАЯ БЕЛАЯ КАПЛЯ */
        .lens-button {
            display: block;
            width: 100%;
            margin-bottom: 25px; /* Разделил их */
            padding: 24px 20px;
            text-decoration: none;
            color: #fff; /* Белый текст для контраста на прозрачном */
            font-weight: 600;
            font-size: 17px;
            border-radius: 50px; /* Скругленные, как капля */
            position: relative;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            
            /* Тончайшая прозрачная база */
            background: rgba(255, 255, 255, 0.1); /* Сделал ПРОЗРАЧНЕЕ */
            backdrop-filter: blur(8px); /* Легкое размытие */
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);

            /* ЭФФЕКТ ПРОЗРАЧНОЙ ОБЪЕМНОЙ КАПЛИ */
            box-shadow: 
                0 15px 30px rgba(0, 0, 0, 0.6), /* Тень снизу */
                0 0 15px rgba(255, 255, 255, 0.15), /* Мягкое внешнее сияние */
                inset 0 12px 18px rgba(255, 255, 255, 0.2), /* Жесткий блик сверху для объема */
                inset 0 -6px 15px rgba(255, 255, 255, 0.1); /* Мягкий отсвет снизу внутри */
            
            overflow: hidden;
        }

        /* Дополнительный верхний глянцевый блик */
        .lens-button::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 15%;
            right: 15%;
            height: 30%;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0) 100%);
            border-radius: 40px;
            pointer-events: none;
        }

        /* Эффект при наведении/нажатии */
        .lens-button:hover {
            transform: translateY(-3px); /* Легкое всплытие */
            background: rgba(255, 255, 255, 0.2); /* Немного ярче */
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }

        .lens-button:active {
            transform: scale(0.96) translateY(0);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="avatar"></div>

        <h1>DaLi STORE 🛍️</h1>
        
        <p class="description">
            Эстетика, формирующая характер. Твой стиль — твоя власть. <br> Начни восхождение к вершине 🕊️
        </p>

        <div class="label">Присоединяйся</div>

        <a href="https://t.me/DaLi_STORE_TG" class="lens-button">Вступить в комьюнити</a>
        
        <a href="https://t.me/SWiWT_Teams" class="lens-button">Связаться / Заказать</a>
    </div>

</body>
</html>
