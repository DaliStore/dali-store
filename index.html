<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DaLi STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background: #000;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: #fff; overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            /* Дышащий фон без Canvas (так надежнее) */
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
            animation: breathe-bg 8s ease-in-out infinite;
        }

        @keyframes breathe-bg {
            0%, 100% { background-size: 100% 100%; }
            50% { background-size: 140% 140%; }
        }

        .container {
            width: 100%; max-width: 400px; text-align: center;
            z-index: 10; transform: scale(0.9);
        }

        .avatar {
            width: 130px; height: 130px; border-radius: 50%;
            border: 2px solid #d4af37; margin: 0 auto 20px;
            background: url('https://i.ibb.co/fdTY6TFb/copy-6-DE92-EDF-28-FF-49-A9-9225-923-B8-A7-B1-BC6.jpg') center/cover;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
        }

        h1 { 
            font-family: 'Playfair Display', serif; font-size: 32px;
            background: linear-gradient(135deg, #d4af37, #ffdf85);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 10px 0;
        }

        .button-wrapper {
            position: relative; margin-bottom: 25px;
            border-radius: 50px; padding: 2px; /* Место для искорки */
            overflow: hidden;
        }

        /* Сама искорка (вращающийся градиент) */
        .sparkle {
            position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, #fff);
            animation: rotate-sparkle 4s linear infinite;
            opacity: 0; transition: opacity 0.5s;
        }

        @keyframes rotate-sparkle {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .lens-button {
            display: block; width: 100%; padding: 22px;
            text-decoration: none; color: #fff; font-weight: 600;
            border-radius: 50px; background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            position: relative; z-index: 5;
            /* Объем линзы */
            box-shadow: inset 0 8px 15px rgba(255, 255, 255, 0.1), 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Классы для JS очереди */
        .active .sparkle { opacity: 1; }

    </style>
</head>
<body>

    <div class="container">
        <div class="avatar"></div>
        <h1>DaLi STORE 🛍️</h1>
        <p style="opacity:0.7; font-size:14px; margin-bottom:40px;">Эстетика, формирующая характер.</p>

        <div class="button-wrapper" id="btn1">
            <div class="sparkle"></div>
            <a href="https://t.me/DaLi_STORE_TG" class="lens-button">Вступить в комьюнити</a>
        </div>

        <div class="button-wrapper" id="btn2">
            <div class="sparkle"></div>
            <a href="https://t.me/SWiWT_Teams" class="lens-button">Связаться / Заказать</a>
        </div>
    </div>

    <script>
        const b1 = document.getElementById('btn1');
        const b2 = document.getElementById('btn2');

        function runCycle() {
            // Включаем на первой
            b1.classList.add('active');
            setTimeout(() => {
                b1.classList.remove('active');
                // Включаем на второй
                b2.classList.add('active');
                setTimeout(() => {
                    b2.classList.remove('active');
                    // Пауза перед кругом
                    setTimeout(runCycle, 1000);
                }, 4000); // Время круга
            }, 4000);
        }
        runCycle();
    </script>
</body>
</html>
