<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DaLi STORE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; text-align: center;
        }

        .avatar-container {
            width: 140px; 
            height: 140px;
            border-radius: 50%;
            margin-bottom: 25px;
            border: 3px solid #2481cc;
            box-shadow: 0 4px 20px rgba(36, 129, 204, 0.4);
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            background-color: #000;
        }

        .profile-pic {
            width: 100%; height: 100%;
            object-fit: cover;
            /* ЗУМ проверенной картинки */
            transform: scale(1.7); 
            /* Добавляет резкости при увеличении */
            image-rendering: -webkit-optimize-contrast; 
        }

        h1 { font-size: 26px; margin: 0 0 10px 0; font-weight: 800; }
        p { font-size: 16px; margin: 0 auto 30px auto; max-width: 280px; line-height: 1.4; opacity: 0.9; }
        
        .btn-container {
            width: 100%; max-width: 320px;
            display: flex; flex-direction: column; gap: 16px;
        }
        
        .btn {
            display: flex; align-items: center; justify-content: center;
            width: 100%; box-sizing: border-box;
            padding: 18px; border-radius: 16px;
            font-size: 18px; font-weight: 700; text-decoration: none;
            transition: all 0.2s ease;
        }

        /* Сочный градиент */
        .btn-main {
            background: linear-gradient(135deg, #2481cc 0%, #0056b3 100%);
            color: #ffffff;
            border: none;
            box-shadow: 0 6px 20px rgba(36, 129, 204, 0.4);
        }

        .btn-outline {
            background-color: transparent;
            border: 2px solid #2481cc;
            color: #2481cc;
        }

        .btn:active {
            transform: scale(0.95);
            filter: brightness(1.2);
        }
    </style>
</head>
<body>
    <div class="avatar-container">
        <img src="https://i.ibb.co/XfSSb3YH/IMG-5353.jpg" alt="Logo" class="profile-pic">
    </div>

    <h1>DaLi STORE 👋</h1>
    <p>Окружите себя вещами, которые имеют значение 📦 От лимитированных коллекций до уютных деталей дома. Ваш стиль начинается здесь 🕊️</p>

    <div class="btn-container">
        <a href="https://t.me/DaLi_STORE_TG" class="btn btn-main">Перейти в канал</a>
        <a href="https://t.me/SWiWT_Teams" class="btn btn-outline">Заказать / Чат</a>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide(); 
    </script>
</body>
</html>
