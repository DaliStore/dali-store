<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DaLi STORE</title>
    <style>
        /* Общие стили фона */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #050505; /* Глубокий черный */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
        }

        .wrapper {
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        /* Аватарка с золотым свечением */
        .profile-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 25px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            /* Обязательно замени 'URL_КАРТИНКИ' на реальную прямую ссылку */
            background-image: url('https://i.ibb.co/Xf8N4mS/dali-photo.jpg'); 
            background-size: cover;
            background-position: center;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .description {
            font-size: 14px;
            line-height: 1.5;
            color: #aaaaaa;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .join-label {
            font-size: 12px;
            letter-spacing: 2px;
            color: #d4af37;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        /* Единый блок стеклянных кнопок */
        .glass-menu {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .menu-item {
            display: block;
            padding: 20px;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Убираем нижнюю линию у последней кнопки */
        .menu-item:last-child {
            border-bottom: none;
        }

        /* Эффект при нажатии/наведении */
        .menu-item:active {
            background: rgba(212, 175, 55, 0.2);
        }

        /* Золотой акцент для первой кнопки */
        .primary {
            color: #d4af37;
            background: rgba(212, 175, 55, 0.05);
        }

    </style>
</head>
<body>

    <div class="wrapper">
        <div class="profile-container">
            <div class="avatar"></div>
        </div>

        <h1>DaLi STORE 💿</h1>
        
        <p class="description">
            Вещи, которые создают твой вайб. Твой стиль — твои правила. Начни путь к статусу 🕊️
        </p>

        <div class="join-label">Присоединяйся</div>

        <div class="glass-menu">
            <a href="#" class="menu-item primary">Вступить в комьюнити</a>
            <a href="#" class="menu-item">Связаться / Заказать</a>
        </div>
    </div>

</body>
</html>
